<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaf Blowing Simulator Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky-top: #74c8ff;
      --sky-bottom: #dff4ff;
      --grass-top: #2dc96c;
      --grass-bottom: #18944c;
      --panel: #b88654;
      --panel-dark: #8f6337;
      --panel-deep: #6f4b27;
      --cream: #fff2d6;
      --ink: #3d2a18;
      --leaf: #2db45f;
      --leaf-dark: #178346;
      --gold: #ffc93d;
      --silver: #d8e3ef;
      --bronze: #cb8854;
      --shadow: rgba(49, 29, 10, 0.28);
      --font-display: "Press Start 2P", cursive;
      --font-body: "Fredoka", sans-serif;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: var(--font-body);
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.95) 0, rgba(255,255,255,0) 18%),
        linear-gradient(180deg, var(--sky-top) 0%, #8fd7ff 32%, #bde7ff 53%, #5fd18d 53%, var(--grass-top) 72%, var(--grass-bottom) 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(17, 116, 57, 0.11) 2px, transparent 2px),
        linear-gradient(90deg, rgba(17, 116, 57, 0.11) 2px, transparent 2px);
      background-size: 42px 42px;
      background-position: 0 55%;
      opacity: 0.45;
    }

    .cloud,
    .leaf-float {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .cloud {
      width: 180px;
      height: 54px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      box-shadow:
        36px -18px 0 10px rgba(255,255,255,0.95),
        96px -10px 0 6px rgba(255,255,255,0.9),
        125px 6px 0 0 rgba(255,255,255,0.86);
      opacity: 0.8;
    }

    .cloud-a { top: 72px; left: 8%; transform: scale(0.85); }
    .cloud-b { top: 138px; right: 12%; transform: scale(1.05); }

    .leaf-float {
      font-size: 42px;
      opacity: 0.13;
      filter: drop-shadow(0 8px 10px rgba(35, 81, 21, 0.18));
    }

    .leaf-a { top: 150px; left: 7%; transform: rotate(-14deg); }
    .leaf-b { top: 320px; right: 8%; transform: rotate(18deg); }
    .leaf-c { bottom: 150px; left: 11%; transform: rotate(9deg); }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
      padding: 36px 18px 72px;
    }

    .hero {
      position: relative;
      margin-bottom: 24px;
      padding: 34px 34px 28px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.24), rgba(255,255,255,0.08)),
        linear-gradient(180deg, rgba(98, 180, 255, 0.9), rgba(91, 196, 130, 0.85));
      border: 4px solid rgba(255,255,255,0.35);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.5),
        0 18px 40px rgba(14, 73, 35, 0.2);
      text-align: center;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36%;
      background:
        linear-gradient(180deg, rgba(0,0,0,0), rgba(23, 131, 70, 0.18)),
        repeating-linear-gradient(
          -12deg,
          rgba(255,255,255,0.12) 0 16px,
          rgba(255,255,255,0) 16px 40px
        );
      opacity: 0.55;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(30px, 5vw, 64px);
      line-height: 1.08;
      color: var(--cream);
      text-shadow:
        0 4px 0 rgba(111, 75, 39, 0.95),
        0 9px 18px rgba(68, 50, 14, 0.25);
    }

    .subtitle {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 20px auto 0;
      font-size: 20px;
      font-weight: 600;
      color: #f5fff8;
      text-shadow: 0 2px 0 rgba(44, 97, 50, 0.32);
    }

    .subtitle span {
      color: #fff8b0;
      font-weight: 700;
    }

    .stats-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .stat-card,
    .table-wrap {
      background: linear-gradient(180deg, var(--panel) 0%, #b07a49 100%);
      border: 4px solid var(--panel-dark);
      border-radius: var(--radius-lg);
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.18),
        0 12px 0 rgba(111, 75, 39, 0.58),
        0 20px 28px rgba(71, 46, 21, 0.18);
    }

    .stat-card {
      padding: 18px 22px;
    }

    .stat-label {
      margin-bottom: 10px;
      color: rgba(61, 42, 24, 0.75);
      font-size: 12px;
      font-family: var(--font-display);
      line-height: 1.4;
      text-transform: uppercase;
    }

    .stat-value {
      color: var(--cream);
      font-size: clamp(22px, 3.6vw, 36px);
      font-family: var(--font-display);
      line-height: 1.1;
      text-shadow: 0 3px 0 rgba(111, 75, 39, 0.9);
      word-break: break-word;
    }

    .stat-value.compact {
      font-size: clamp(18px, 2.7vw, 28px);
      line-height: 1.2;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .sort-label {
      color: rgba(56, 41, 23, 0.8);
      font-size: 12px;
      font-family: var(--font-display);
      text-transform: uppercase;
    }

    .sort-btn,
    .refresh-btn {
      border: 3px solid var(--panel-dark);
      border-radius: 12px;
      background: linear-gradient(180deg, #c18d5a 0%, #a86f3f 100%);
      color: var(--cream);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.16),
        0 5px 0 rgba(111, 75, 39, 0.85);
      font-family: var(--font-display);
      font-size: 11px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .sort-btn {
      padding: 12px 16px;
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
    }

    .sort-btn:hover,
    .refresh-btn:hover {
      transform: translateY(1px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.16),
        0 4px 0 rgba(111, 75, 39, 0.85);
    }

    .sort-btn.active {
      background: linear-gradient(180deg, #37bf6a 0%, #1f9c4d 100%);
      border-color: var(--leaf-dark);
      box-shadow:
        inset 0 2px 0 rgba(210,255,225,0.22),
        0 5px 0 rgba(20, 102, 48, 0.9);
    }

    .spacer {
      flex: 1;
    }

    .table-wrap {
      overflow: hidden;
    }

    .table-head {
      display: grid;
      grid-template-columns: 74px 1.35fr 190px 140px;
      gap: 10px;
      padding: 18px 20px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
      border-bottom: 3px solid rgba(111, 75, 39, 0.48);
    }

    .th {
      color: rgba(56, 41, 23, 0.72);
      font-size: 12px;
      font-family: var(--font-display);
      text-transform: uppercase;
    }

    .th.right,
    .stat-cell {
      text-align: right;
    }

    .row,
    .skeleton-row {
      display: grid;
      grid-template-columns: 74px 1.35fr 190px 140px;
      gap: 10px;
      align-items: center;
      padding: 16px 20px;
    }

    .row {
      border-bottom: 2px solid rgba(111, 75, 39, 0.3);
      animation: pop-in 0.24s ease both;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row:nth-child(odd) {
      background: rgba(255, 241, 214, 0.08);
    }

    .row:hover {
      background: rgba(255, 248, 219, 0.14);
    }

    @keyframes pop-in {
      from {
        opacity: 0;
        transform: translateY(6px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .rank-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rank-badge {
      min-width: 38px;
      height: 38px;
      padding: 0 10px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 3px solid rgba(111, 75, 39, 0.7);
      color: var(--ink);
      background: #f4ead8;
      font-family: var(--font-display);
      font-size: 14px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.35);
    }

    .rank-1 { background: linear-gradient(180deg, #ffd95b 0%, #ffbc1f 100%); }
    .rank-2 { background: linear-gradient(180deg, #edf4fa 0%, #b7c3d0 100%); }
    .rank-3 { background: linear-gradient(180deg, #e4a873 0%, #bc7843 100%); }
    .rank-other { background: linear-gradient(180deg, #f0dfc4 0%, #ddb98d 100%); }

    .player-cell {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .avatar-placeholder {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #8cc7ff 0%, #5f90e6 100%);
      border: 3px solid rgba(111, 75, 39, 0.58);
      color: var(--cream);
      font-family: var(--font-display);
      font-size: 13px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.18);
    }

    .avatar-placeholder::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 242, 214, 0.85);
      box-shadow:
        0 22px 0 8px rgba(255, 242, 214, 0.85);
      transform: translateY(-8px);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      flex-shrink: 0;
      object-fit: cover;
      background: linear-gradient(180deg, #8cc7ff 0%, #5f90e6 100%);
      border: 3px solid rgba(111, 75, 39, 0.58);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.18);
    }

    .username {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--cream);
      font-family: var(--font-display);
      font-size: 13px;
      line-height: 1.45;
      text-shadow: 0 2px 0 rgba(111, 75, 39, 0.82);
    }

    .row-1 .username { color: #fff7bd; }
    .row-2 .username { color: #f5fbff; }
    .row-3 .username { color: #ffe0bf; }

    .stat-cell {
      color: var(--cream);
      font-family: var(--font-display);
      font-size: 13px;
      line-height: 1.4;
      text-shadow: 0 2px 0 rgba(111, 75, 39, 0.82);
    }

    .stat-cell.leaves {
      color: #d3ffd6;
    }

    .stat-cell.level {
      color: #d8f0ff;
    }

    .state-box {
      padding: 56px 24px;
      text-align: center;
      color: var(--cream);
      font-family: var(--font-display);
      font-size: 12px;
      line-height: 1.8;
      text-shadow: 0 2px 0 rgba(111, 75, 39, 0.82);
    }

    .state-box svg {
      display: block;
      margin: 0 auto 18px;
      opacity: 0.75;
    }

    .skel {
      height: 20px;
      border-radius: 10px;
      background: rgba(255, 245, 227, 0.18);
      animation: shimmer 1.3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.38; }
      50% { opacity: 0.8; }
    }

    footer {
      padding-top: 34px;
      text-align: center;
      color: rgba(53, 41, 23, 0.78);
      font-family: var(--font-display);
      font-size: 10px;
      line-height: 1.9;
      text-transform: uppercase;
    }

    footer a {
      color: var(--panel-deep);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--leaf-dark);
    }

    @media (max-width: 820px) {
      .stats-row {
        grid-template-columns: 1fr;
      }

      .table-head,
      .row,
      .skeleton-row {
        grid-template-columns: 62px 1fr 132px;
      }

      .th:last-child,
      .stat-cell.level,
      .skeleton-row div:last-child {
        display: none;
      }
    }

    @media (max-width: 580px) {
      .wrapper {
        padding: 18px 12px 48px;
      }

      .hero {
        padding: 24px 16px 22px;
      }

      .subtitle {
        font-size: 15px;
      }

      .controls {
        gap: 10px;
      }

      .sort-label {
        width: 100%;
      }

      .refresh-btn {
        width: 100%;
        justify-content: center;
      }

      .table-head,
      .row,
      .skeleton-row {
        grid-template-columns: 50px 1fr 94px;
        padding-left: 12px;
        padding-right: 12px;
      }

      .username,
      .stat-cell {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="cloud cloud-a"></div>
  <div class="cloud cloud-b"></div>
  <div class="leaf-float leaf-a">🍃</div>
  <div class="leaf-float leaf-b">🍂</div>
  <div class="leaf-float leaf-c">🍃</div>

  <div class="wrapper">
    <header class="hero">
      <h1>Top Leaf Blowers</h1>
      <p class="subtitle">The best players in the yard, ranked by <span>Leaves</span> and <span>Level</span>.</p>
    </header>

    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-label">Last Refreshed</div>
        <div class="stat-value" style="font-size:18px;padding-top:6px" id="stat-updated">-</div>
      </div>
    </div>

    <div class="controls">
      <span class="sort-label">Sort By</span>
      <button class="sort-btn active" id="sort-leaves" onclick="setSort('leaves')">Leaves</button>
      <button class="sort-btn" id="sort-level" onclick="setSort('level')">Level</button>
      <div class="spacer"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
          <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
        Refresh Board
      </button>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <div class="th">#</div>
        <div class="th">Player</div>
        <div class="th right">Leaves</div>
        <div class="th right">Level</div>
      </div>
      <div id="table-body">
        <div class="skeleton-row"><div class="skel" style="width:38px;height:38px;border-radius:12px"></div><div class="skel" style="width:160px"></div><div class="skel" style="margin-left:auto;width:94px"></div><div class="skel" style="margin-left:auto;width:72px"></div></div>
        <div class="skeleton-row"><div class="skel" style="width:38px;height:38px;border-radius:12px"></div><div class="skel" style="width:124px"></div><div class="skel" style="margin-left:auto;width:94px"></div><div class="skel" style="margin-left:auto;width:72px"></div></div>
        <div class="skeleton-row"><div class="skel" style="width:38px;height:38px;border-radius:12px"></div><div class="skel" style="width:180px"></div><div class="skel" style="margin-left:auto;width:94px"></div><div class="skel" style="margin-left:auto;width:72px"></div></div>
        <div class="skeleton-row"><div class="skel" style="width:38px;height:38px;border-radius:12px"></div><div class="skel" style="width:136px"></div><div class="skel" style="margin-left:auto;width:94px"></div><div class="skel" style="margin-left:auto;width:72px"></div></div>
        <div class="skeleton-row"><div class="skel" style="width:38px;height:38px;border-radius:12px"></div><div class="skel" style="width:154px"></div><div class="skel" style="margin-left:auto;width:94px"></div><div class="skel" style="margin-left:auto;width:72px"></div></div>
      </div>
    </div>

    <footer>
      <p>Built for the yard. Powered by Supabase. Open source on <a href="https://github.com/claudeluke1" target="_blank">GitHub</a>.</p>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="eternitynum.js"></script>
  <script src="app.js"></script>
</body>
</html>
